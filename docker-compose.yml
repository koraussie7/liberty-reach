version: '3.9'

services:
  dada-server:
    build: .
    container_name: dada-server
    ports:
      - '8000:8000'
    environment:
      - SERVER_PORT=8000
    volumes:
      - .:/app
    command: python server.py
    restart: unless-stopped
    networks:
      - dada-network

  minima-node:
    image: minima/minima:latest
    container_name: minima-node
    ports:
      - '9001:9001'
      - '8080:8080'
    volumes:
      - minima-data:/minima
    restart: unless-stopped
    networks:
      - dada-network

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - dada-server
    networks:
      - dada-network

networks:
  dada-network:
    driver: bridge

volumes:
  minima-data:
