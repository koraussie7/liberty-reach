<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Liberty Reach - Web Chat</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f9fa; height: 100vh; }

.app { max-width: 480px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; }
.header { background: #FEE500; padding: 14px 16px; display: flex; align-items: center; gap: 10px; position: sticky; top: 0; z-index: 10; }
.header h1 { font-size: 18px; font-weight: 700; flex: 1; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: #4CAF50; display: inline-block; }
.status { font-size: 11px; color: #666; }
.notice { background: #fff3cd; color: #856404; padding: 6px 16px; font-size: 12px; text-align: center; }

.messages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 2px; }
.msg { max-width: 75%; padding: 10px 14px; border-radius: 16px; font-size: 15px; line-height: 1.4; word-break: break-word; position: relative; }
.msg.me { align-self: flex-end; background: #FEE500; border-bottom-right-radius: 4px; }
.msg.ai { align-self: flex-start; background: #e9ecef; border-bottom-left-radius: 4px; }
.msg .time { font-size: 10px; color: #999; margin-top: 4px; text-align: right; }
.msg .label { font-size: 10px; font-weight: 600; color: #8B7E00; margin-bottom: 4px; }
.msg img { max-width: 100%; border-radius: 8px; margin-bottom: 6px; display: block; }
.msg.loading { background: #e9ecef; }
.msg .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #FEE500; border-top-color: transparent; border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }

.input-bar { background: white; padding: 8px 12px 16px; display: flex; gap: 6px; align-items: flex-end; border-top: 1px solid #eee; }
.input-bar input { flex: 1; padding: 10px 16px; border: none; border-radius: 20px; background: #f0f0f0; font-size: 15px; outline: none; }
.input-bar button { width: 40px; height: 40px; border: none; border-radius: 50%; background: #FEE500; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.input-bar button:disabled { background: #ccc; }
.input-bar .attach { background: none; color: #999; font-size: 24px; }

.preview { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: white; border-radius: 12px; padding: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); display: none; }
.preview img { max-width: 200px; max-height: 200px; border-radius: 8px; }
.preview .close { position: absolute; top: -8px; right: -8px; background: #ff4444; color: white; border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; font-size: 14px; }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div>
      <h1>Liberty Reach</h1>
      <div><span class="dot" id="statusDot"></span> <span class="status" id="statusText">Connecting...</span></div>
    </div>
  </div>
  <div class="notice">This model does not support image input</div>

  <div class="messages" id="messages"></div>

  <div class="input-bar">
    <button class="attach" onclick="alert('Gemma model does not support image input')">+</button>
    <input type="text" id="msgInput" placeholder="Message..." onkeydown="if(event.key==='Enter') sendMessage()">
    <button id="sendBtn" onclick="sendMessage()">></button>
  </div>
</div>

<script>
const API = '/chat';
const MODEL = 'gemma-4-e4b-it';
async function checkHealth() {
  try {
    const r = await fetch(API + '/healthz', { signal: AbortSignal.timeout(8000) });
    if (r.ok) {
      document.getElementById('statusDot').style.background = '#4CAF50';
      document.getElementById('statusText').textContent = 'Gemma-4 Ready';
    }
  } catch {
    document.getElementById('statusDot').style.background = '#ff4444';
    document.getElementById('statusText').textContent = 'Offline';
  }
}
checkHealth();
setInterval(checkHealth, 10000);

function addMessage(text, isMe, opts = {}) {
  const div = document.createElement('div');
  div.className = 'msg ' + (isMe ? 'me' : 'ai');
  if (opts.loading) div.classList.add('loading');

  let html = '';
  if (!isMe && !opts.loading) html += '<div class="label">Gemma AI</div>';
  if (opts.loading) html += '<span class="spinner"></span> analyzing...';
  if (opts.image) html += '<img src="' + opts.image + '">';
  html += text ? text : '';
  html += '<div class="time">' + new Date().toLocaleTimeString('ko-KR', {hour:'2-digit',minute:'2-digit'}) + '</div>';
  div.innerHTML = html;
  document.getElementById('messages').appendChild(div);
  div.scrollIntoView({ behavior: 'smooth' });
  return div;
}

async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, true);
  input.value = '';
  await callAI(text);
}

async function callAI(prompt) {
  const loadingMsg = addMessage('', false, { loading: true });
  document.getElementById('sendBtn').disabled = true;

  try {
    const body = {
      model: MODEL,
      messages: [{ role: 'user', content: prompt }],
      max_tokens: 2048,
      temperature: 0.7
    };

    const res = await fetch(API + '/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    loadingMsg.remove();

    if (res.ok) {
      const data = await res.json();
      const msg = data.choices?.[0]?.message || {};
      const reply = msg.content || msg.reasoning || '(no response)';
      addMessage(reply, false);
    } else {
      const err = await res.text();
      addMessage('Error: ' + (err.substring(0, 200)), false);
    }
  } catch(e) {
    loadingMsg.remove();
    addMessage('Connection error: ' + e.message, false);
  }
  document.getElementById('sendBtn').disabled = false;
}
</script>
</body>
</html>
