server {
    listen 80;
    server_name muhantube.com www.muhantube.com;

    location /api/ {
        proxy_pass http://dada-server:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location /health {
        proxy_pass http://dada-server:8000/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /ai/ {
        proxy_pass http://dada-server:8000/ai/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
    }

    location /blockchain/ {
        proxy_pass http://dada-server:8000/blockchain/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 30s;
    }

    location /ws/ {
        proxy_pass http://dada-server:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /v1/ {
        proxy_pass http://localai:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location / {
        root /var/www/liberty;
        index index.html;
        try_files $uri $uri/ =404;
    }
}
